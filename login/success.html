<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 성공</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        .success-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .success-icon {
            font-size: 4rem;
            color: #4ade80;
            margin-bottom: 1rem;
        }
        
        .success-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .success-message {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        
        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 2px;
            width: 0%;
            animation: loading 3s ease-in-out forwards;
        }
        
        .redirect-text {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4ade80;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1 class="success-title">로그인 성공!</h1>
        <p class="success-message">
            GitHub 계정으로 성공적으로 로그인되었습니다.<br>
            잠시 후 메인 페이지로 이동합니다.
        </p>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        <div class="redirect-text">
            <div class="spinner"></div>
            블로그 페이지로 이동 중...
        </div>
    </div>

    <script>
        // URL에서 사용자 정보 파라미터 추출
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        const role = urlParams.get('role');
        const githubId = urlParams.get('githubId') || username; // githubId가 없으면 username 사용
        
        // 사용자 정보를 blog-script.js와 호환되는 형식으로 저장
        if (username && role) {
            const currentUser = {
                githubId: githubId,
                name: username,
                role: role,
                authenticated: true,
                loginTime: new Date().getTime()
            };
            
            // blog-script.js에서 읽는 키로 저장
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
            sessionStorage.setItem('isAuthenticated', 'true');
        }
        
        // 3초 후 메인 페이지로 리다이렉트
        setTimeout(() => {
            // success.html이 /login/success.html 경로에 있으므로 상위 디렉토리로 이동
            window.location.href = '../index.html?login=success';
        }, 3000);
        
        // 즉시 이동을 원하는 경우를 위한 클릭 이벤트
        document.addEventListener('click', () => {
            window.location.href = '../index.html?login=success';
        });
    </script>
</body>
</html>
